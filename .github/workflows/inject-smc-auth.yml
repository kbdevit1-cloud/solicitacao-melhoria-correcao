name: Inject SMC Auth

on:
  workflow_dispatch:
  push:
    paths:
      - smc-auth.js
      - .github/workflows/inject-smc-auth.yml

permissions:
  contents: write

jobs:
  inject-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update SMC auth script tag
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          script = '<script src="smc-auth.js?v=13"></script>'
          if 'smc-auth.js' in html:
              html = re.sub(r'<script src="smc-auth\.js\?v=\d+"></script>', script, html)
              html = re.sub(r'<script src="smc-auth\.js"></script>', script, html)
          else:
              html = html.replace('</body>', f'{script}\n</body>')
          p.write_text(html, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Atualiza versao do login SMC" || echo "No changes"
          git push
