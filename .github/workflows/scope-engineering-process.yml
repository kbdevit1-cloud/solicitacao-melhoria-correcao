name: Apply Engineering Process Scope

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/scope-engineering-process.yml

permissions:
  contents: write

jobs:
  update-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update request scope in index.html
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('index.html')
          html = p.read_text(encoding='utf-8')

          replacements = [
              ('Canal para registrar algo que precisa ser melhorado, ajustado ou arrumado, com data e dia de abertura.', 'Canal para registrar e acompanhar demandas internas da Engenharia de Processo, com data, hora, status e histórico centralizado.'),
              ('Eng. Processo • SGQ • Manutenção', 'Engenharia de Processo'),
              ('O formulário serve para solicitação de melhoria, correção, organização, padronização, ergonomia ou segurança preventiva. A solicitação deve ser direcionada para Engenharia de Processo, SGQ ou Manutenção.', 'O formulário serve exclusivamente para demandas da Engenharia de Processo: melhorias, correções, ajustes, alterações, apoio técnico, documentação, padronizações e sistemas internos do setor.'),
              ('Informar área, setor/local, problema, solicitação e foto.', 'Informar área, setor/local, demanda, impacto e evidência.'),
              ('Para sugerir uma melhoria ou pedir correção de algo que esteja prejudicando o processo.', 'Para centralizar demandas que hoje chegam por conversas soltas, com registro, evidência e acompanhamento.'),
              ('<li>Mesa da pré-formatação quebrada</li><li>Posto sem identificação adequada</li><li>Organização que atrapalha o trabalho</li><li>Melhoria de fluxo, padrão ou ergonomia</li>', '<li>Solicitação de firmware, arquivo técnico ou pasta de processo</li><li>Ajuste, edição ou correção de documento/padrão</li><li>Melhoria de fluxo, processo ou sistema interno</li><li>Apoio técnico da Engenharia de Processo</li>'),
              ('Para consultar as solicitações abertas separadas por Engenharia de Processo, SGQ e Manutenção.', 'Para consultar solicitações da Engenharia de Processo e manter rastreabilidade das demandas abertas.'),
              ('<li>Filtro por destino</li><li>Data e dia de abertura</li><li>Histórico centralizado via Supabase</li>', '<li>Filtro por demanda, tipo e status</li><li>Data e dia de abertura</li><li>Histórico centralizado via Supabase</li>'),
              ('<div class="example-box"><strong>Manutenção</strong><span>Mesa da pré-formatação está quebrada e dificulta a atividade.</span></div><div class="example-box"><strong>Eng. Processo</strong><span>Criar suporte para separar materiais e evitar mistura no processo.</span></div><div class="example-box"><strong>SGQ</strong><span>Instrução ou identificação do processo está gerando dúvida.</span></div><div class="example-box"><strong>Organização</strong><span>Bancada está sem padrão e atrapalha a rotina do setor.</span></div>', '<div class="example-box"><strong>Firmware</strong><span>Verificar FW da PROT ou pasta técnica para liberar produção.</span></div><div class="example-box"><strong>Processo</strong><span>Avaliar melhoria, correção ou alteração no fluxo da linha.</span></div><div class="example-box"><strong>Documentação</strong><span>Ajustar instrução, padrão, identificação ou registro usado no processo.</span></div><div class="example-box"><strong>Sistema interno</strong><span>Solicitar apoio em planilhas, dashboards ou ferramentas da Engenharia.</span></div>'),
              ('<h2>Formulário de solicitação</h2><small>Preencha com clareza para facilitar a análise e tratativa.</small>', '<h2>Formulário de solicitação para Engenharia de Processo</h2><small>Preencha com clareza para facilitar análise, priorização e tratativa pela Engenharia de Processo.</small>'),
              ('</div></div><form id="formSolicitacao">', '</div></div><div class="notice warning"><strong>Este sistema é destinado exclusivamente a solicitações relacionadas à Engenharia de Processo. Solicitações fora deste escopo devem ser direcionadas à área responsável.</strong></div><form id="formSolicitacao">'),
              ('placeholder="Ex.: Pré-formatação, PTH, sala ADM..."', 'placeholder="Ex.: SMT, PTH, NPI, firmware, sistema interno..."'),
              ('<label>Direcionar para <span class="required">*</span></label><select id="destino" required><option value="">Selecione...</option><option>Engenharia de Processo</option><option>SGQ</option><option>Manutenção</option></select>', '<label>Direcionar para <span class="required">*</span></label><select id="destino" required><option value="">Selecione...</option><option>Engenharia de Processo</option></select>'),
              ('<select id="tipo" required><option value="">Selecione...</option><option>Correção / arrumar algo</option><option>Melhoria de processo</option><option>Organização / 5S</option><option>Identificação / padronização</option><option>Ergonomia</option><option>Segurança preventiva</option><option>Outro</option></select>', '<select id="tipo" required><option value="">Selecione...</option><option>Melhoria de processo</option><option>Correção de processo</option><option>Ajuste / edição</option><option>Solicitação de alteração</option><option>Apoio técnico</option><option>Padronização</option><option>Documentação</option><option>Melhoria em sistema interno</option><option>Firmware / arquivo técnico</option><option>Outro assunto da Engenharia de Processo</option></select>'),
              ('placeholder="Ex.: mesa da pré-formatação"', 'placeholder="Ex.: linha SMT, posto, pasta de firmware, dashboard..."'),
              ('placeholder="Ex.: Mesa da pré-formatação quebrada"', 'placeholder="Ex.: Verificar FW da PROT I002 para pack de 6700"'),
              ('placeholder="Descreva o que precisa ser arrumado ou melhorado..."', 'placeholder="Descreva a necessidade, divergência, dúvida técnica ou melhoria de processo..."'),
              ('placeholder="Ex.: Solicito avaliação e ajuste da mesa..."', 'placeholder="Ex.: Solicito avaliação da Engenharia de Processo e direcionamento técnico..."'),
              ('<label class="chip"><input type="checkbox" name="impacto" value="Dificulta o processo"> Dificulta o processo</label><label class="chip"><input type="checkbox" name="impacto" value="Gera perda de tempo"> Gera perda de tempo</label><label class="chip"><input type="checkbox" name="impacto" value="Pode gerar erro"> Pode gerar erro</label><label class="chip"><input type="checkbox" name="impacto" value="Afeta organização"> Afeta organização</label><label class="chip"><input type="checkbox" name="impacto" value="Afeta ergonomia"> Afeta ergonomia</label><label class="chip"><input type="checkbox" name="impacto" value="Risco preventivo"> Risco preventivo</label>', '<label class="chip"><input type="checkbox" name="impacto" value="Bloqueia produção"> Bloqueia produção</label><label class="chip"><input type="checkbox" name="impacto" value="Gera perda de tempo"> Gera perda de tempo</label><label class="chip"><input type="checkbox" name="impacto" value="Pode gerar erro"> Pode gerar erro</label><label class="chip"><input type="checkbox" name="impacto" value="Gera dúvida técnica"> Gera dúvida técnica</label><label class="chip"><input type="checkbox" name="impacto" value="Afeta padrão/documentação"> Afeta padrão/documentação</label><label class="chip"><input type="checkbox" name="impacto" value="Afeta sistema interno"> Afeta sistema interno</label>'),
              ('placeholder="Turno, frequência do problema, detalhe extra..."', 'placeholder="Caminho de pasta, código do produto, linha, turno, frequência ou detalhe extra..."'),
              ('A solicitação será registrada no Supabase, mantendo os dados centralizados para consulta no painel.', 'A solicitação será registrada no Supabase para rastreabilidade da Engenharia de Processo e consulta no painel.'),
              ('<small>Acompanhe solicitações abertas e separadas por destino.</small>', '<small>Acompanhe solicitações da Engenharia de Processo por tipo, status e histórico.</small>'),
              ('<div class="stat"><strong id="st_sgq">0</strong><span>SGQ</span></div><div class="stat"><strong id="st_manutencao">0</strong><span>Manutenção</span></div>', '<div class="stat"><strong id="st_sgq">0</strong><span>Hist. SGQ</span></div><div class="stat"><strong id="st_manutencao">0</strong><span>Hist. Manut.</span></div>'),
              ('<select id="f_destino" onchange="renderTable()"><option value="">Todos destinos</option><option>Engenharia de Processo</option><option>SGQ</option><option>Manutenção</option></select>', '<select id="f_destino" onchange="renderTable()"><option value="">Todos destinos/histórico</option><option>Engenharia de Processo</option><option value="SGQ">SGQ (histórico)</option><option value="Manutenção">Manutenção (histórico)</option></select>'),
              ('<select id="f_tipo" onchange="renderTable()"><option value="">Todos tipos</option><option>Correção / arrumar algo</option><option>Melhoria de processo</option><option>Organização / 5S</option><option>Identificação / padronização</option><option>Ergonomia</option><option>Segurança preventiva</option><option>Outro</option></select>', '<select id="f_tipo" onchange="renderTable()"><option value="">Todos tipos</option><option>Melhoria de processo</option><option>Correção de processo</option><option>Ajuste / edição</option><option>Solicitação de alteração</option><option>Apoio técnico</option><option>Padronização</option><option>Documentação</option><option>Melhoria em sistema interno</option><option>Firmware / arquivo técnico</option><option>Outro assunto da Engenharia de Processo</option><option value="Correção / arrumar algo">Correção / arrumar algo (histórico)</option><option value="Organização / 5S">Organização / 5S (histórico)</option><option value="Identificação / padronização">Identificação / padronização (histórico)</option><option value="Ergonomia">Ergonomia (histórico)</option><option value="Segurança preventiva">Segurança preventiva (histórico)</option><option value="Outro">Outro (histórico)</option></select>'),
              ('const botao=e.target.querySelector(\'button[type="submit"]\');', 'if(val("destino")!=="Engenharia de Processo"){alert("Este sistema é destinado exclusivamente a solicitações relacionadas à Engenharia de Processo. Solicitações fora deste escopo devem ser direcionadas à área responsável.");return}const botao=e.target.querySelector(\'button[type="submit"]\');'),
              ('function tagTipo(t){if(t==="Correção / arrumar algo")return"tag-correcao";if(t==="Melhoria de processo")return"tag-melhoria";if(t==="Organização / 5S")return"tag-organizacao";return"tag-melhoria"}', 'function tagTipo(t){if(t==="Correção / arrumar algo"||t==="Correção de processo")return"tag-correcao";if(t==="Melhoria de processo"||t==="Melhoria em sistema interno"||t==="Apoio técnico"||t==="Firmware / arquivo técnico")return"tag-melhoria";if(t==="Organização / 5S"||t==="Padronização"||t==="Documentação"||t==="Ajuste / edição"||t==="Solicitação de alteração")return"tag-organizacao";return"tag-melhoria"}'),
          ]

          for old, new in replacements:
              if old not in html:
                  raise SystemExit(f'Trecho esperado não encontrado: {old[:120]}')
              html = html.replace(old, new)

          p.write_text(html, encoding='utf-8')
          PY
      - name: Commit update and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git rm --ignore-unmatch .github/workflows/scope-engineering-process.yml
          git commit -m "Focus requests on Engineering Process scope"
          git push
