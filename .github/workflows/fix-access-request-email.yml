name: Fix access request email flow

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-access-request-email.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch smc-auth.js with diagnostics
        shell: bash
        run: |
          python3 <<'PY'
          import re
          import traceback
          from pathlib import Path

          debug = []
          ok = False
          try:
              p = Path('smc-auth.js')
              text = p.read_text(encoding='utf-8')
              debug.append(f'file_length_before={len(text)}')

              checks = {
                  'normalizer': bool(re.search(r'function smcNormalizarUsuario\(raw\)\{.*?\n\}\n\nfunction smcMensagemAuth', text, flags=re.S)),
                  'login_text': 'Digite seu usuário corporativo ou e-mail completo. O sistema bloqueia domínio pessoal.' in text,
                  'login_input': 'Usuário ou e-mail corporativo</label><input id="smcLoginUsuario" type="text" placeholder="nome.sobrenome" autocomplete="off"' in text,
                  'login_small': 'Exemplo: nome.sobrenome ou nome.sobrenome${SMC_DOMAIN}' in text,
                  'usuario_prefill': 'const usuario = normalized.ok ? normalized.usuario : "";' in text,
                  'cadastro_input': 'Usuário ou e-mail corporativo</label><input id="smcCadastroUsuario" type="text"' in text,
                  'cadastro_small': 'placeholder="nome.sobrenome" autocomplete="off" autocapitalize="none" spellcheck="false"><small>O sistema aplicará ${SMC_DOMAIN} se você digitar apenas o usuário.</small>' in text,
                  'upsert': 'const { error: requestError } = await smcAuthClient.from("access_requests").upsert(payload, { onConflict:"email" });' in text,
              }
              debug.extend(f'{k}={v}' for k, v in checks.items())

              new_func = "\n".join([
                  'function smcNormalizarUsuario(raw){',
                  '  let value = String(raw || "").trim().toLowerCase().replace(/\\s+/g, "");',
                  '  if (!value) return { ok:false, message:"Informe seu e-mail corporativo." };',
                  '  if (!value.includes("@")) {',
                  '    return { ok:false, message:"Informe o e-mail corporativo completo, incluindo @globaleletronics.ind.br." };',
                  '  }',
                  '  const parts = value.split("@");',
                  '  if (parts.length !== 2) {',
                  '    return { ok:false, message:"E-mail corporativo inválido." };',
                  '  }',
                  '  const [local, domain] = parts;',
                  '  if ("@" + domain !== SMC_DOMAIN) {',
                  '    return { ok:false, message:"Acesso permitido apenas para e-mails corporativos da Global Eletronics." };',
                  '  }',
                  '  if (!/^[a-z0-9._-]{2,80}$/.test(local)) return { ok:false, message:"E-mail corporativo inválido." };',
                  '  return { ok:true, usuario:local, email:local + SMC_DOMAIN };',
                  '}'
              ])
              text, count = re.subn(r'function smcNormalizarUsuario\(raw\)\{.*?\n\}\n\nfunction smcMensagemAuth', lambda _m: new_func + '\n\nfunction smcMensagemAuth', text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError('normalizer block not replaced')

              replacements = {
                  'Digite seu usuário corporativo ou e-mail completo. O sistema bloqueia domínio pessoal.': 'Digite seu e-mail corporativo completo. O sistema bloqueia domínio pessoal.',
                  'Usuário ou e-mail corporativo</label><input id="smcLoginUsuario" type="text" placeholder="nome.sobrenome" autocomplete="off"': 'E-mail corporativo</label><input id="smcLoginUsuario" type="email" placeholder="nome.sobrenome@globaleletronics.ind.br" autocomplete="email"',
                  'Exemplo: nome.sobrenome ou nome.sobrenome${SMC_DOMAIN}': 'Use o e-mail corporativo completo.',
                  'const usuario = normalized.ok ? normalized.usuario : "";': 'const usuario = normalized.ok ? normalized.email : "";',
                  'Usuário ou e-mail corporativo</label><input id="smcCadastroUsuario" type="text"': 'E-mail corporativo</label><input id="smcCadastroUsuario" type="email"',
                  'placeholder="nome.sobrenome" autocomplete="off" autocapitalize="none" spellcheck="false"><small>O sistema aplicará ${SMC_DOMAIN} se você digitar apenas o usuário.</small>': 'placeholder="nome.sobrenome@globaleletronics.ind.br" autocomplete="email" autocapitalize="none" spellcheck="false"><small>Digite o e-mail corporativo completo. Não use apenas o usuário.</small>',
                  'const { error: requestError } = await smcAuthClient.from("access_requests").upsert(payload, { onConflict:"email" });': 'const { error: requestError } = await smcAuthClient.from("access_requests").insert(payload);',
              }
              for key, value in replacements.items():
                  if key not in text and value not in text:
                      raise RuntimeError('missing expected text: ' + key[:120])
                  text = text.replace(key, value, 1)

              p.write_text(text, encoding='utf-8')
              debug.append(f'file_length_after={len(text)}')
              ok = True
          except Exception:
              debug.append('exception=')
              debug.append(traceback.format_exc())

          Path('workflow-debug.txt').write_text('\n'.join(debug) + '\n', encoding='utf-8')
          Path('patch-status.txt').write_text('ok' if ok else 'failed', encoding='utf-8')
          PY
      - name: Validate JavaScript syntax
        run: |
          if [ "$(cat patch-status.txt)" = "ok" ]; then
            node --check smc-auth.js
          fi
      - name: Commit patch or diagnostics
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$(cat patch-status.txt)" = "ok" ]; then
            git checkout -- workflow-debug.txt patch-status.txt || true
            git add smc-auth.js
            git status --short
            git diff --cached --name-only
            if git diff --cached --quiet; then
              echo "No staged changes to commit."
              exit 0
            fi
            git commit -m "Fix access request email and RLS insert flow"
          else
            git add workflow-debug.txt patch-status.txt
            git status --short
            if git diff --cached --quiet; then
              echo "No diagnostic changes to commit."
              exit 0
            fi
            git commit -m "Add access request workflow diagnostics"
          fi
          git push origin HEAD:main
