name: Sanitize SMC example text

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sanitize-example-text.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace specific example texts
        shell: bash
        run: |
          set -euxo pipefail
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          replacements = {
            'Solicitação de firmware, arquivo técnico ou pasta de processo': 'Solicitação de arquivo técnico, orientação ou informação de processo',
            'Verificar FW da PROT ou pasta técnica para liberar produção.': 'Solicitar verificação técnica ou orientação para continuidade do processo.',
            'Avaliar melhoria, correção ou alteração no fluxo da linha.': 'Avaliar melhoria, correção ou alteração em fluxo de processo.',
            'Ajustar instrução, padrão, identificação ou registro usado no processo.': 'Ajustar instrução, padrão, identificação ou registro operacional.',
            'Solicitar apoio em planilhas, dashboards ou ferramentas da Engenharia.': 'Solicitar apoio em ferramentas internas da Engenharia de Processo.',
            'Ex.: SMT, PTH, NPI, firmware, sistema interno...': 'Informe o setor, processo ou local relacionado...',
            'Ex.: linha SMT, posto, pasta de firmware, dashboard...': 'Informe o local, posto, documento, sistema ou processo...',
            'Ex.: Verificar FW da PROT I002 para pack de 6700': 'Descreva a solicitação de forma objetiva',
            'Caminho de pasta, código do produto, linha, turno, frequência ou detalhe extra...': 'Inclua informações complementares necessárias para análise...',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing expected text: {old}')
              text = text.replace(old, new)
          p.write_text(text, encoding='utf-8')
          PY
          grep -q 'Solicitar verificação técnica ou orientação para continuidade do processo.' index.html
          if grep -E 'PROT|I002|pack de 6700|código do produto|linha SMT|pasta de firmware|FW da PROT' index.html; then
            echo 'Specific example text still present'
            exit 1
          fi
      - name: Commit and remove workflow
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/sanitize-example-text.yml
          git add index.html
          git commit -m "Sanitize public example text"
          git push origin HEAD:main
