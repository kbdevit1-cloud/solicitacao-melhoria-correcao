<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMC - Planner da Engenharia de Processo</title>
  <style>
    :root{
      --page:#050b16;--header:#07111f;--card:#102540;--card2:#0c1b30;--line:#24425f;--text:#f4f8ff;--muted:#c7d7ea;--muted2:#91a6bc;--blue:#2f80ed;--blue2:#153a66;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--shadow:0 18px 45px rgba(0,0,0,.32);--radius:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at 86% 14%,rgba(47,128,237,.13),transparent 23%),linear-gradient(180deg,#07111f 0,#050b16 55%,#040914 100%);color:var(--text)}
    header{background:rgba(7,17,31,.98);border-bottom:1px solid rgba(255,255,255,.08);padding:14px 24px 17px}.wrap{width:min(1180px,calc(100vw - 48px));margin:0 auto}.head{display:flex;align-items:center;justify-content:space-between;gap:18px}h1{margin:0 0 6px;font-size:28px;line-height:1.15;letter-spacing:-.4px}p{margin:0;color:var(--muted);font-size:14px;line-height:1.55}.subtitle{font-size:13px;color:var(--muted);line-height:1.45}.badge{flex:0 0 auto;color:#d9ecff;background:rgba(47,128,237,.13);border:1px solid rgba(47,128,237,.55);border-radius:999px;padding:8px 13px;font-weight:700;font-size:11px;white-space:nowrap}main{padding:20px 0 36px}button{border:0;border-radius:10px;padding:11px 14px;background:var(--blue);color:#fff;font-size:13px;font-weight:800;cursor:pointer;transition:.16s ease}button:hover{filter:brightness(1.06);transform:translateY(-1px)}button:disabled{opacity:.55;cursor:not-allowed;transform:none}.mini{display:block;margin-top:5px;color:var(--muted2);font-size:11px;line-height:1.35}@media(max-width:900px){header{padding:14px 18px 16px}.wrap{width:min(1180px,calc(100vw - 32px))}.head{align-items:flex-start}}@media(max-width:560px){h1{font-size:24px}.head{display:grid}.badge{width:max-content}}
  </style>
  <link rel="stylesheet" href="planner.css?v=1">
</head>
<body>
<header><div class="wrap head"><div><h1>SMC - Planner da Engenharia de Processo</h1><p class="subtitle">Canal interno para abrir solicitações, direcionar responsáveis, acompanhar tarefas, permissões, tempo executado e carga de trabalho.</p></div><div class="badge">Engenharia de Processo</div></div></header>
<main class="wrap">
  <section class="planner-panel planner-locked"><h3>Carregando Planner</h3><p>Validando autenticação corporativa e permissões da Engenharia de Processo.</p></section>
</main>
<script src="smc-auth.js?v=17"></script>
<script src="planner.js?v=1"></script>
</body>
</html>
